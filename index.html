<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JASCI TRPG Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="menu-screen">
        <button id="new-game-btn">New Game</button>
        <button id="load-game-btn">Load Game</button>
        <button id="settings-btn">Settings</button>
    </div>

    <div id="character-creator" class="hidden">
        <!-- Character creator content will be populated by renderTables() later -->
        <h2>Character Creator</h2>
        <label for="charName">Character Name:</label>
        <input type="text" id="charName" value="Hero"><br><br>
        <!-- Stats and skills will be rendered here by JavaScript -->
        <h3>Stats</h3>
        <div id="statsBody"></div>
        <h3>Skills (Skill Points: <span id="skillPoints">30</span>)</h3>
        <div id="skillsBody"></div>
        <button onclick="startGame()">Start Game</button> 
    </div>

    <div id="game-container" class="hidden">
        <div id="left-panel">
            <div id="character-info-panel" class="hidden">
                <!-- Character info will be rendered here by JavaScript -->
            </div>
        </div>
        <div id="middle-panel">
            <div id="mapContainer"></div>
            <div id="console"></div>
        </div>
        <div id="right-panel">
            <!-- Basic game controls can be added here later -->
            <h3>Health Status</h3>
            <table id="healthTable">
                <thead>
                    <tr>
                        <th>Body Part</th>
                        <th>HP</th>
                        <th>Armor</th>
                        <th>Crisis Timer</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Health data will be rendered here by JavaScript -->
                </tbody>
            </table>
            <h3>Interactable Items</h3>
            <div id="itemList"></div>
            <h3>Actions</h3>
            <div id="actionList"></div>
            <h3>Hand Slots</h3>
            <div id="handSlots"></div>
            <h3>Inventory (Slots: <span id="invCapacity">0/0</span>)</h3>
            <div id="inventoryList"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
